<!DOCTYPE html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="parent">
        <div class="right">
        <img src="images/image.png" width="30%" height="100%">
        </div>
        <div class="left">
        <h1>Doctor Appointment Form</h1>
        <hr>
            <form>
            <div class="item">
            <label>Appointment Date</label>
            </div>
            <input type="date" name="date" placeholder="Appointment Date">
            <br>
            <br>
            <div class="item">
            <label>Appointment Time</label>
            </div>
            <input type="time" name="time" placeholder="Appointment Time">
            <br>
            <br>
            <div class="item">
            <label>Name</label>
            </div>
            <input type="text" name="first-name" placeholder="First">
            <input type="text" name="last-name" placeholder="Last">
            <br>
            <br>
            <div class="item">
            <label>Gender</label>
            </div>
            <span>Male</span><input type="radio" name="gender" value="male">
            <span>Female</span><input type="radio" name="gender" value="female">
            <br>
            <br>
            <div class="item">
            <label>Phone</label>
            </div>
            <input type="number" name="phone-number" placeholder="####">
            <br>
            <br>
            <div class="item">
            <label>Address</label>
            </div>
            <input type="text" name="city" placeholder="city">
            <input type="text" name="state" placeholder="state">
            <br>
            <br>
            <div class="item">
            <label>Your Query</label>
            </div>
            <input type="query" name="query">
            <br>
            <br>
            <div class="item">
            <label>Appointment Type</label>
            </div>
            <div class="item2">
            <label>Select which appointment type(s) you require</label>
            <br>
            <input type="checkbox" name="checkup" value="Cervix checkup"><span>Cervix checkup</span>
            <br>
            <input type="checkbox" name="checkup" value="Heart checkup"><span>Heart checkup</span>
            <br>
            <input type="checkbox" name="checkup" value="Eye check-up"><span>Eye check-up</span>
            <br>
            <input type="checkbox" name="checkup" value="Hearing Test"><span>Hearing Test</span>
            <br>
            <br>
            <button>Send</button>
            </div>
            </form>
        </div>
        </div>
   </div>
</body>
</html>
